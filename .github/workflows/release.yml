name: Release

# Publishes @run-agents/threads to npm when you publish a GitHub Release.
# Flow:  npm version patch|minor|major  →  git push --follow-tags  →
#        create a GitHub Release for that tag  →  this workflow publishes.
# Requires a repo secret NPM_TOKEN (an npm automation token).

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
